<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  h1 { margin-bottom: 10px; }
  canvas {
    background: #222;
    border: 2px solid #4a9d6f;
  }
  #score { margin-bottom: 10px; font-size: 18px; }
  #restart {
    margin-top: 15px;
    padding: 10px 20px;
    background: #4a9d6f;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    display: none;
  }
</style>
</head>
<body>

<h1>🐍 Snake</h1>
<div id="score">Score: 0</div>
<canvas id="game" width="320" height="320"></canvas>
<button id="restart" onclick="startGame()">Play Again</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const box = 16;
let snake, direction, food, score, gameLoop;

function startGame() {
  snake = [{x: 8*box, y: 8*box}];
  direction = 'RIGHT';
  score = 0;
  document.getElementById('score').innerText = 'Score: 0';
  document.getElementById('restart').style.display = 'none';
  placeFood();
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(draw, 120);
}

function placeFood() {
  food = {
    x: Math.floor(Math.random() * (canvas.width / box)) * box,
    y: Math.floor(Math.random() * (canvas.height / box)) * box
  };
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' && direction !== 'RIGHT') direction = 'LEFT';
  else if (e.key === 'ArrowUp' && direction !== 'DOWN') direction = 'UP';
  else if (e.key === 'ArrowRight' && direction !== 'LEFT') direction = 'RIGHT';
  else if (e.key === 'ArrowDown' && direction !== 'UP') direction = 'DOWN';
});

// simple swipe support for mobile
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0 && direction !== 'LEFT') direction = 'RIGHT';
    else if (dx < 0 && direction !== 'RIGHT') direction = 'LEFT';
  } else {
    if (dy > 0 && direction !== 'UP') direction = 'DOWN';
    else if (dy < 0 && direction !== 'DOWN') direction = 'UP';
  }
});

function draw() {
  ctx.fillStyle = '#222';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(food.x, food.y, box, box);

  for (let i = 0; i < snake.length; i++) {
    ctx.fillStyle = i === 0 ? '#4a9d6f' : '#7fc99a';
    ctx.fillRect(snake[i].x, snake[i].y, box - 1, box - 1);
  }

  let head = {x: snake[0].x, y: snake[0].y};
  if (direction === 'LEFT') head.x -= box;
  if (direction === 'UP') head.y -= box;
  if (direction === 'RIGHT') head.x += box;
  if (direction === 'DOWN') head.y += box;

  // wall collision
  if (head.x < 0 || head.y < 0 || head.x >= canvas.width || head.y >= canvas.height) {
    return gameOver();
  }
  // self collision
  for (let i = 0; i < snake.length; i++) {
    if (head.x === snake[i].x && head.y === snake[i].y) return gameOver();
  }

  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById('score').innerText = 'Score: ' + score;
    placeFood();
  } else {
    snake.pop();
  }

  snake.unshift(head);
}

function gameOver() {
  clearInterval(gameLoop);
  document.getElementById('restart').style.display = 'inline-block';
}

startGame();
</script>

</body>
</html>
